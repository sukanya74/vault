# =============================================================
# PHASE 2 — Normal operation
# Run this every time after bootstrap is complete.
# Vault Agent expects role_id and secret_id to already exist
# in ./agent/ (provisioned during Phase 1 bootstrap).
# =============================================================

networks:
  vault-internal:
    driver: bridge
    name: vault-internal
  vault-agent-bridge:
    driver: bridge
    name: vault-agent-bridge

volumes:
  vault-data:
    name: vault-data
  agent-secrets:
    name: agent-secrets

services:

  # -----------------------------------------------------------
  # Vault Server — just runs, nothing else
  # Unseal is done manually by the operator after start
  # -----------------------------------------------------------
  vault:
    image: hashicorp/vault:1.17
    container_name: vault-server
    restart: unless-stopped
    hostname: vault
    environment:
      SKIP_SETCAP: "true"
    volumes:
      - vault-data:/vault/data
      - ./vault-config.hcl:/vault/config/vault.hcl:ro
      - ./policies:/vault/policies:ro
    networks:
      - vault-internal
    ports:
      - "8200:8200"
    command: vault server -config=/vault/config/vault.hcl

  # -----------------------------------------------------------
  # Vault Agent — only authenticates and renders secrets
  # Never touches init, unseal, or policy setup
  # Requires role_id and secret_id to exist in ./agent/
  # -----------------------------------------------------------
  vault-agent:
    image: hashicorp/vault:1.17
    container_name: vault-agent
    restart: unless-stopped
    environment:
      VAULT_ADDR: "http://vault:8200"
      SKIP_SETCAP: "true"
    volumes:
      - ./agent:/vault/agent:ro
      - agent-secrets:/vault/secrets
    networks:
      - vault-internal
      - vault-agent-bridge
    command: vault agent -config=/vault/agent/agent.hcl -log-level=info
